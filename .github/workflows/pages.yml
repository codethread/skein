# Publishes the mkdocs-material site to GitHub Pages on every push to main.
#
# HUMAN SETUP REQUIRED: this workflow deploys via the native GitHub Actions
# Pages flow (configure-pages / upload-pages-artifact / deploy-pages), which
# requires the repo's Settings -> Pages -> "Build and deployment" source to be
# set to "GitHub Actions" (it defaults to "Deploy from a branch"). Until a
# repo admin flips that setting, the deploy job will fail even though this
# workflow runs. Once enabled, the site is served from
# https://codethread.github.io/skein/.
name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
      - run: make docs-site
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
