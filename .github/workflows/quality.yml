name: Quality Gates

on:
  pull_request:
  push:
    branches: [main, quality-gates]
  workflow_dispatch:

jobs:
  changes:
    name: Changed paths
    runs-on: ubuntu-latest
    outputs:
      clojure: ${{ steps.filter.outputs.clojure }}
      go: ${{ steps.filter.outputs.go }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            clojure:
              - 'src/**'
              - 'test/**'
              - 'dev/**'
              - 'spools/**'
              - '.skein/**'
              - 'deps.edn'
              - '.clj-kondo/**'
              - '.cljfmt.edn'
              - '.splint.edn'
            go:
              - 'cli/**'
              - 'go.work'
              - '.golangci.yml'
            shared:
              - '.github/workflows/**'
              - 'Makefile'
              - 'scripts/quality/**'

  clojure-test:
    name: Clojure test suite
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.clojure == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      # Hosted runners have ~2 cores, so the suite's fixed cross-thread poll
      # deadlines run under far more fork/CPU pressure than a dev machine.
      # Widen every await budget through the single test-support knob instead
      # of editing call sites; a solo local run leaves it unset (scale 1.0).
      - run: clojure -M:test
        env:
          SKEIN_TEST_AWAIT_SCALE: '3'

  cli-go-test:
    name: CLI Go tests
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.clojure == 'true' || needs.changes.outputs.go == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: go test ./...
        working-directory: cli

  smoke-test:
    name: Smoke test
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.clojure == 'true' || needs.changes.outputs.go == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: clojure -M:smoke

  spool-suites:
    name: Spool suites
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.clojure == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: make spool-suite-gate

  clojure-format:
    name: Clojure format check
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.clojure == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: make fmt-check-clj

  go-format:
    name: Go format check
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.go == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - run: make fmt-check-go

  format-check:
    name: Format check
    needs: [clojure-format, go-format]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          test "${{ needs.clojure-format.result }}" != failure
          test "${{ needs.go-format.result }}" != failure

  clj-kondo:
    name: clj-kondo
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.clojure == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: make lint-clj

  splint:
    name: splint
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.clojure == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: make lint-splint

  lint-conventions:
    name: Lint conventions
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.clojure == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: make lint-conventions

  golangci-lint:
    name: golangci-lint
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.go == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - run: make lint-go

  lint:
    name: lint
    needs: [clj-kondo, splint, lint-conventions, golangci-lint]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          test "${{ needs.clj-kondo.result }}" != failure
          test "${{ needs.splint.result }}" != failure
          test "${{ needs.lint-conventions.result }}" != failure
          test "${{ needs.golangci-lint.result }}" != failure

  reflection:
    name: Reflection warnings
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.clojure == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: make reflect-check

  docs-check:
    name: Docs check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - uses: astral-sh/setup-uv@v8.2.0
      - run: make docs-check

  clojure-security-report:
    name: Clojure security report
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.clojure == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: make security-report-clj
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  go-security-report:
    name: Go security report
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.go == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - run: make security-report-go

  security-report:
    name: Security report
    needs: [clojure-security-report, go-security-report]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - run: true
