site_name: Skein Docs
site_description: Source documentation projection for Skein
site_url: ""
docs_dir: .mkdocs
site_dir: site

repo_url: https://github.com/codethread/skein
repo_name: codethread/skein

# Rewrites repo-relative links that leave the docs collection (source files,
# RFC/archive material) to GitHub blob URLs, so builds can run --strict and
# every remaining warning is a genuinely broken link.
hooks:
  - scripts/mkdocs_hooks.py

theme:
  name: material
  features:
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  # The homepage is the repository README, which is written in GitHub-flavored
  # markdown: md_in_html renders the fenced code inside its <details markdown>
  # dropdowns, gfm_admonition renders its > [!NOTE] alerts.
  - md_in_html
  - gfm_admonition

nav:
  # The root landing page is the repository README (.mkdocs/index.md symlinks
  # it), so the site opens on the same pitch and worked example as GitHub.
  - Home: index.md
  - Skein: docs/skein.md
  - Getting Started: docs/getting-started.md
  - Writing Shared Spools: docs/writing-shared-spools.md
  - Library Authoring: docs/library-authoring.md
  - Specs:
      - Tenets: devflow/TENETS.md
      - Philosophy: devflow/PHILOSOPHY.md
      - Alpha Surface: devflow/specs/alpha-surface.md
      - CLI Surface: devflow/specs/cli.md
      - Weaver Runtime: devflow/specs/daemon-runtime.md
      - REPL API: devflow/specs/repl-api.md
      - Strand Model: devflow/specs/strand-model.md
  # Generated per-fn reference for the blessed skein.api.*.alpha tier; the
  # behavior contracts remain the specs above (SPEC-005.C2).
  - Alpha API:
      - Index: docs/api/README.md
      - skein.api.batch.alpha: docs/api/batch.api.md
      - skein.api.cli.alpha: docs/api/cli.api.md
      - skein.api.current.alpha: docs/api/current.api.md
      - skein.api.events.alpha: docs/api/events.api.md
      - skein.api.format.alpha: docs/api/format.api.md
      - skein.api.graph.alpha: docs/api/graph.api.md
      - skein.api.hooks.alpha: docs/api/hooks.api.md
      - skein.api.notes.alpha: docs/api/notes.api.md
      - skein.api.patterns.alpha: docs/api/patterns.api.md
      - skein.api.peers.alpha: docs/api/peers.api.md
      - skein.api.relations.alpha: docs/api/relations.api.md
      - skein.api.runtime.alpha: docs/api/runtime.api.md
      - skein.api.scheduler.alpha: docs/api/scheduler.api.md
      - skein.api.views.alpha: docs/api/views.api.md
      - skein.api.vocab.alpha: docs/api/vocab.api.md
      - skein.api.weaver.alpha: docs/api/weaver.api.md
  - Spools:
      - Index: spools/README.md
      - Batteries:
          - Contract: spools/batteries.md
          - Cookbook: spools/batteries.cookbook.md
          - API: spools/batteries.api.md
      - Workflow:
          - Contract: spools/workflow.md
          - Cookbook: spools/workflow.cookbook.md
          - API: spools/workflow.api.md
      - Devflow Lifecycle: spools/devflow.md
      - Ephemeral Strands:
