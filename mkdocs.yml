site_name: Skein Docs
site_description: Source documentation projection for Skein
site_url: ""
docs_dir: .mkdocs
site_dir: site

repo_url: https://github.com/codethread/skein
repo_name: codethread/skein

# Rewrites repo-relative links that leave the docs collection (source files,
# RFC/archive material) to GitHub blob URLs, so builds can run --strict and
# every remaining warning is a genuinely broken link.
hooks:
  - scripts/mkdocs_hooks.py

theme:
  name: material
  features:
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  # The homepage is the repository README, which is written in GitHub-flavored
  # markdown: md_in_html renders the fenced code inside its <details markdown>
  # dropdowns, gfm_admonition renders its > [!NOTE] alerts.
  - md_in_html
  - gfm_admonition

nav:
  # The root landing page is the repository README (.mkdocs/index.md symlinks
  # it), so the site opens on the same pitch and worked example as GitHub.
  - Home: index.md
  - Tutorial: docs/tutorial.md
  - Reference: docs/reference.md
  # The user-side spools ladder: customise -> test -> share. The bundled
  # spools Skein ships keep their own section below.
  - Spools:
      - Customising your workspace: docs/spools/customisation.md
      - Testing your config and spools: docs/spools/testing.md
      - Writing Shared Spools: docs/spools/writing-shared-spools.md
  - Specs:
      - Tenets: devflow/TENETS.md
      - Philosophy: devflow/PHILOSOPHY.md
      - Alpha Surface: devflow/specs/alpha-surface.md
      - CLI Surface: devflow/specs/cli.md
      - Weaver Runtime: devflow/specs/daemon-runtime.md
      - REPL API: devflow/specs/repl-api.md
      - Strand Model: devflow/specs/strand-model.md
  # Generated per-fn reference for the blessed skein.api.*.alpha tier; the
  # behavior contracts remain the specs above (SPEC-005.C2).
  - Alpha API:
      - Index: docs/api/README.md
      - skein.api.batch.alpha: docs/api/batch.api.md
      - skein.api.cli.alpha: docs/api/cli.api.md
      - skein.api.clock.alpha: docs/api/clock.api.md
      - skein.api.current.alpha: docs/api/current.api.md
      - skein.api.events.alpha: docs/api/events.api.md
      - skein.api.format.alpha: docs/api/format.api.md
      - skein.api.graph.alpha: docs/api/graph.api.md
      - skein.api.hooks.alpha: docs/api/hooks.api.md
      - skein.api.notes.alpha: docs/api/notes.api.md
      - skein.api.patterns.alpha: docs/api/patterns.api.md
      - skein.api.peers.alpha: docs/api/peers.api.md
      - skein.api.relations.alpha: docs/api/relations.api.md
      - skein.api.return-shape.alpha: docs/api/return-shape.api.md
      - skein.api.runtime.alpha: docs/api/runtime.api.md
      - skein.api.runtime.glossary.alpha: docs/api/runtime-glossary.api.md
      - skein.api.runtime.help-transform.alpha: docs/api/runtime-help-transform.api.md
      - skein.api.scheduler.alpha: docs/api/scheduler.api.md
      - skein.api.spool.alpha: docs/api/spool.api.md
      - skein.api.vocab.alpha: docs/api/vocab.api.md
      - skein.api.weaver.alpha: docs/api/weaver.api.md
  - Bundled Spools:
      - Index: spools/README.md
      - Batteries:
          - Contract: spools/batteries.md
          - Cookbook: spools/batteries.cookbook.md
          - API: spools/batteries.api.md
      - Workflow:
          - Contract: spools/workflow.md
          - Cookbook: spools/workflow.cookbook.md
          - API: spools/workflow.api.md
      - Devflow Lifecycle: spools/devflow.md
      - Weaver Guild:
          - Contract: spools/guild.md
          - Cookbook: spools/guild.cookbook.md
          - API: spools/guild.api.md
      - Text Search (UNSAFE):
          - Contract: spools/unsafe-text-search.md
          - Cookbook: spools/unsafe-text-search.cookbook.md
          - API: spools/unsafe-text-search.api.md
      - Kanban Board: spools/kanban.md
      - Shell Gate Executor:
          - Contract: spools/executors/shell.md
          - Cookbook: spools/executors/shell.cookbook.md
          - API: spools/executors/shell.api.md
      - Chime Notifications:
          - Contract: spools/chime/README.md
          - Cookbook: spools/chime.cookbook.md
          - API: spools/chime.api.md
      - Cron Engine:
          - Contract: spools/cron/README.md
          - Cookbook: spools/cron.cookbook.md
          - API: spools/cron.api.md
  - External Spools:
      - Agent Runs:
          - Contract: https://github.com/codethread/agent-harness.spool/blob/27c7429c1642d1fdb609af4c37d11d51db202bb4/agent-run/README.md
          - Cookbook: https://github.com/codethread/agent-harness.spool/blob/27c7429c1642d1fdb609af4c37d11d51db202bb4/agent-run/agent-run.cookbook.md
          - API: https://github.com/codethread/agent-harness.spool/blob/27c7429c1642d1fdb609af4c37d11d51db202bb4/agent-run/agent-run.api.md
      - Delegation Spool:
          - Contract: https://github.com/codethread/agent-harness.spool/blob/27c7429c1642d1fdb609af4c37d11d51db202bb4/delegation/README.md
          - Cookbook: https://github.com/codethread/agent-harness.spool/blob/27c7429c1642d1fdb609af4c37d11d51db202bb4/delegation/delegation.cookbook.md
          - API: https://github.com/codethread/agent-harness.spool/blob/27c7429c1642d1fdb609af4c37d11d51db202bb4/delegation/delegation.api.md
      - Subagent Gate Executor:
          - Contract: https://github.com/codethread/agent-harness.spool/blob/27c7429c1642d1fdb609af4c37d11d51db202bb4/agent-run/subagent.md
          - Cookbook: https://github.com/codethread/agent-harness.spool/blob/27c7429c1642d1fdb609af4c37d11d51db202bb4/agent-run/subagent.cookbook.md
          - API: https://github.com/codethread/agent-harness.spool/blob/27c7429c1642d1fdb609af4c37d11d51db202bb4/agent-run/subagent.api.md
      - Bench Harness Benchmarks:
          - Contract: https://github.com/codethread/agent-harness.spool/blob/27c7429c1642d1fdb609af4c37d11d51db202bb4/bench/README.md
          - API: https://github.com/codethread/agent-harness.spool/blob/27c7429c1642d1fdb609af4c37d11d51db202bb4/bench/bench.api.md
